# ----- Configuraciï¿½n de la conexiï¿½n a PostgreSQL -----
spring.datasource.url=jdbc:postgresql://localhost:5432/nuevaera
spring.datasource.username=postgres
spring.datasource.password=ClavePostgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Evitar que JPA intente crear/actualizar tablas automï¿½ticamente.
# Si tus tablas ya existen, usa 'none'. En desarrollo, podrï¿½as usar 'update'.
spring.jpa.hibernate.ddl-auto=none

# Mostrar en consola las consultas SQL que ejecuta Hibernate (opcional)
spring.jpa.show-sql=true

# Dialecto de Hibernate para PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Puerto en el que correrï¿½ tu API Spring Boot
server.port=8080

